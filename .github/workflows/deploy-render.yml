name: Deploy to Render

"on":
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          missing=0
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            missing=1
          fi
          if [ -z "$APP_HEALTHCHECK_URL" ]; then
            echo "Missing secret: APP_HEALTHCHECK_URL"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for service warm-up
        run: sleep 20

      - name: Check production health endpoint
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$APP_HEALTHCHECK_URL")
            if [ "$code" = "200" ]; then
              echo "Health check passed with HTTP 200"
              exit 0
            fi
            echo "Attempt $i/12 failed with HTTP $code"
            sleep 10
          done

          echo "Health check failed after retries"
          exit 1
