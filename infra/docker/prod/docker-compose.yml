services:
  app:
    build:
      context: ../../..
      dockerfile: infra/docker/prod/Dockerfile
    container_name: cdm_app_prod
    env_file:
      - path: ../../../backend/.env
        required: false
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "false"
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cdm_nginx_prod
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ../../../infra/nginx/prod/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cdm_postgres_prod
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  app_public:
  app_storage:
